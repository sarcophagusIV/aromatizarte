<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin - Aromatizarte</title>
  <link rel="stylesheet" href="/admin.css">
</head>
<body>
  <div class="container">
    <h1>Panel de administración</h1>

    <div id="login-box">
      <h2>Iniciar sesión</h2>
      <form id="login-form">
        <label>Email:<input type="text" id="email" value="admin"></label>
        <label>Contraseña:<input type="password" id="password" value="1234"></label>
        <button type="submit">Entrar</button>
      </form>
      <div id="login-msg" class="msg"></div>
    </div>

    <div id="admin-area" style="display:none">
      <div class="topbar">
        <button id="logout">Cerrar sesión</button>
      </div>

      <section id="create-section">
        <h2>Crear producto</h2>
        <form id="create-form">
          <input placeholder="Nombre" id="c-nombre" required>
          <input placeholder="Slug" id="c-slug" required>
          <input placeholder="Precio" id="c-precio" type="number" step="0.01" required>
          <input placeholder="Stock" id="c-stock" type="number" value="0">
          <input placeholder="Categoria ID" id="c-categoria" type="number">
          <input placeholder="Imagen URL" id="c-imagen">
          <label><input type="checkbox" id="c-destacado"> Destacado</label>
          <textarea id="c-descripcion" placeholder="Descripción"></textarea>
          <button type="submit">Crear</button>
        </form>
        <div id="create-msg" class="msg"></div>
      </section>

      <section id="list-section">
        <h2>Productos</h2>
        <div id="productos-list">Cargando...</div>
      </section>
    </div>
  </div>

  <script src="/admin.js"></script>
</body>
</html>
